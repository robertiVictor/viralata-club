<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - ViraLata Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="page-wrapper">
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner-border" role="status"><span class="visually-hidden">Carregando...</span></div>
  </div>
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/"><span class="brand-logo-icon"><i class="bi bi-heart-fill"></i></span><span>ViraLata Club</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Menu de navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/pets.html">Pets</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/saiba-mais.html">Saiba Mais</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/sobre-nos.html">Sobre Nós</a></li>
        </ul>
        <ul class="navbar-nav" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <div class="page-content d-flex align-items-center py-5" style="background: linear-gradient(135deg, var(--primary-light) 0%, #fff 100%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold" style="color:var(--primary)">Bem-vindo de volta!</h2>
          <p class="text-muted">Entre para ver os pets disponíveis para adoção.</p>
        </div>
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-4 p-md-5">
            <h4 class="text-center mb-4 fw-bold">Entrar</h4>
            <div id="erro-login" class="alert alert-danger d-none" role="alert"></div>
            <form id="login-form" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">E-mail</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control" id="email" required placeholder="seu@email.com" autocomplete="username">
                </div>
              </div>
              <div class="mb-4">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="senha" required placeholder="Sua senha" autocomplete="current-password">
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
              </button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted">
              Não tem conta? <a href="/pages/register.html" class="fw-semibold">Cadastre-se gratuitamente</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <footer class="text-center">
    <div class="container">
      <p class="mb-0">&copy; 2026 ViraLata Club.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const erroEl = document.getElementById('erro-login');
    const btnLogin = document.getElementById('btn-login');

    function mostrarErro(msg) {
      erroEl.textContent = msg;
      erroEl.classList.remove('d-none');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      erroEl.classList.add('d-none');
      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            senha: document.getElementById('senha').value,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          mostrarErro(data.message || 'E-mail ou senha inválidos');
          return;
        }

        saveAuth(data.data.token, data.data.user);
        window.location.href = data.data.user.role === 'admin' ? '/pages/admin/dashboard.html' : '/';

      } catch (err) {
        mostrarErro('Erro de conexão. Verifique se o servidor está rodando.');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
