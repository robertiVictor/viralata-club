<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Usuários - ViraLata Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
  </div>
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/"><span class="brand-logo-icon"><i class="bi bi-heart-fill"></i></span><span>ViraLata Club</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Menu de navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="/">Site</a></li></ul>
        <ul class="navbar-nav" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block admin-sidebar py-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="/pages/admin/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/pets-manage.html"><i class="bi bi-heart me-2"></i>Gerenciar Pets</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/adocoes-manage.html"><i class="bi bi-clipboard-check me-2"></i>Solicitações</a></li>
          <li class="nav-item"><a class="nav-link active" href="/pages/admin/users-manage.html"><i class="bi bi-people me-2"></i>Usuários</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/notificacoes.html"><i class="bi bi-bell me-2"></i>Notificações</a></li>
        </ul>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        <h2 class="mb-4">Gerenciar Usuários</h2>
        <div class="table-responsive">
          <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="table-light">
              <tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Role</th><th>Status</th><th>Cadastro</th><th>Ações</th></tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal Confirmar Exclusão -->
  <div class="modal fade" id="deleteUserModal" tabindex="-1" aria-modal="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirmar Exclusão</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">Tem certeza que deseja excluir este usuário?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btn-confirmar-delete-user">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let userParaDeletar = null;

    async function carregarUsers() {
      try {
        const res = await apiRequest('/users');
        const users = res.data;
        const tbody = document.getElementById('users-tbody');

        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.nome}</td>
            <td>${u.email}</td>
            <td>${u.telefone || '—'}</td>
            <td><span class="badge ${u.role === 'admin' ? 'bg-primary' : 'bg-secondary'}">${u.role}</span></td>
            <td>${u.bloqueado ? '<span class="badge bg-danger">Bloqueado</span>' : '<span class="badge bg-success">Ativo</span>'}</td>
            <td>${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
            <td>
              ${u.role !== 'admin' ? `
                <button class="btn btn-sm btn-outline-warning me-1" onclick="toggleBloquear('${u.id}')" title="${u.bloqueado ? 'Desbloquear' : 'Bloquear'}">
                  <i class="bi bi-${u.bloqueado ? 'unlock' : 'lock'}"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="confirmarDeleteUser('${u.id}')"><i class="bi bi-trash"></i></button>
              ` : '—'}
            </td>
          </tr>
        `).join('');
      } catch (err) {
        showToast('Erro ao carregar usuários', 'error');
      }
    }

    async function toggleBloquear(id) {
      showLoading();
      try {
        const res = await apiRequest(`/users/${id}/bloquear`, { method: 'PATCH' });
        showToast(res.message);
        carregarUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function confirmarDeleteUser(id) {
      userParaDeletar = id;
      new bootstrap.Modal(document.getElementById('deleteUserModal')).show();
    }

    document.getElementById('btn-confirmar-delete-user').addEventListener('click', async () => {
      if (!userParaDeletar) return;
      showLoading();
      try {
        await apiRequest(`/users/${userParaDeletar}`, { method: 'DELETE' });
        showToast('Usuário excluído com sucesso!');
        bootstrap.Modal.getInstance(document.getElementById('deleteUserModal')).hide();
        carregarUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
        userParaDeletar = null;
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn() || !isAdmin()) { window.location.href = '/pages/login.html'; return; }
      carregarUsers();
    });
  </script>
</body>
</html>
