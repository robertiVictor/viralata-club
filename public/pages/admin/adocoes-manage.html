<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitações de Adoção - ViraLata Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
  </div>
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/"><span class="brand-logo-icon"><i class="bi bi-heart-fill"></i></span><span>ViraLata Club</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Menu de navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="/">Site</a></li></ul>
        <ul class="navbar-nav" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block admin-sidebar py-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="/pages/admin/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/pets-manage.html"><i class="bi bi-heart me-2"></i>Gerenciar Pets</a></li>
          <li class="nav-item"><a class="nav-link active" href="/pages/admin/adocoes-manage.html"><i class="bi bi-clipboard-check me-2"></i>Solicitações</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/users-manage.html"><i class="bi bi-people me-2"></i>Usuários</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/notificacoes.html"><i class="bi bi-bell me-2"></i>Notificações</a></li>
        </ul>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        <h2 class="mb-4">Solicitações de Adoção</h2>
        <div class="table-responsive">
          <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="table-light">
              <tr><th>Pet</th><th>Adotante</th><th>E-mail</th><th>Telefone</th><th>Mensagem</th><th>Status</th><th>Data</th><th>Ações</th></tr>
            </thead>
            <tbody id="adocoes-tbody">
              <tr><td colspan="8" class="text-center text-muted">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function carregarAdocoes() {
      try {
        const res = await apiRequest('/adocoes');
        const adocoes = res.data;
        const tbody = document.getElementById('adocoes-tbody');

        if (adocoes.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Nenhuma solicitação.</td></tr>';
          return;
        }

        tbody.innerHTML = adocoes.map(a => `
          <tr>
            <td>${a.pet_nome}</td>
            <td>${a.adotante_nome}</td>
            <td>${a.adotante_email}</td>
            <td>${a.adotante_telefone || '—'}</td>
            <td>${a.mensagem || '—'}</td>
            <td>${statusBadge(a.status)}</td>
            <td>${new Date(a.created_at).toLocaleDateString('pt-BR')}</td>
            <td>
              ${(a.status === 'pendente' || a.status === 'em_analise') ? `
                <button class="btn btn-sm btn-success me-1" onclick="aprovar('${a.id}')" title="Aprovar"><i class="bi bi-check-lg"></i></button>
                <button class="btn btn-sm btn-danger" onclick="rejeitar('${a.id}')" title="Rejeitar"><i class="bi bi-x-lg"></i></button>
              ` : '—'}
            </td>
          </tr>
        `).join('');
      } catch (err) {
        showToast('Erro ao carregar solicitações', 'error');
      }
    }

    async function aprovar(id) {
      showLoading();
      try {
        await apiRequest(`/adocoes/${id}/aprovar`, { method: 'PATCH' });
        showToast('Adoção aprovada!');
        carregarAdocoes();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function rejeitar(id) {
      showLoading();
      try {
        await apiRequest(`/adocoes/${id}/rejeitar`, { method: 'PATCH' });
        showToast('Adoção rejeitada.');
        carregarAdocoes();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn() || !isAdmin()) { window.location.href = '/pages/login.html'; return; }
      carregarAdocoes();
    });
  </script>
</body>
</html>
