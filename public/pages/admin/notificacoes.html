<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificações - ViraLata Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
  </div>
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">🐕 Vira<span>Lata</span> Club</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="/">Site</a></li></ul>
        <ul class="navbar-nav" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block admin-sidebar py-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="/pages/admin/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/pets-manage.html"><i class="bi bi-heart me-2"></i>Gerenciar Pets</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/adocoes-manage.html"><i class="bi bi-clipboard-check me-2"></i>Solicitações</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin/users-manage.html"><i class="bi bi-people me-2"></i>Usuários</a></li>
          <li class="nav-item"><a class="nav-link active" href="/pages/admin/notificacoes.html"><i class="bi bi-bell me-2"></i>Notificações</a></li>
        </ul>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        <h2 class="mb-4">Notificações</h2>
        <div id="notificacoes-list">
          <div class="text-center">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function carregarNotificacoes() {
      try {
        const res = await apiRequest('/notificacoes');
        const notificacoes = res.data;
        const container = document.getElementById('notificacoes-list');

        if (notificacoes.length === 0) {
          container.innerHTML = '<div class="text-center text-muted py-5">Nenhuma notificação.</div>';
          return;
        }

        container.innerHTML = notificacoes.map(n => `
          <div class="card mb-2 ${n.lida ? '' : 'border-primary'}">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <h6 class="mb-1">${n.lida ? '' : '<i class="bi bi-circle-fill text-primary me-1" style="font-size:0.5rem;"></i>'}${n.titulo}</h6>
                <p class="mb-0 text-muted small">${n.conteudo || ''}</p>
                <small class="text-muted">${new Date(n.created_at).toLocaleString('pt-BR')}</small>
              </div>
              ${!n.lida ? `<button class="btn btn-sm btn-outline-primary" onclick="marcarLida('${n.id}')">Marcar como lida</button>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) {
        showToast('Erro ao carregar notificações', 'error');
      }
    }

    async function marcarLida(id) {
      try {
        await apiRequest(`/notificacoes/${id}/lida`, { method: 'PATCH' });
        carregarNotificacoes();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn() || !isAdmin()) { window.location.href = '/pages/login.html'; return; }
      carregarNotificacoes();
    });
  </script>
</body>
</html>
