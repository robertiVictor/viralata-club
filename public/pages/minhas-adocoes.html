<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Solicitações - ViraLata Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
  </div>
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/"><span class="brand-logo-icon"><i class="bi bi-heart-fill"></i></span><span>ViraLata Club</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Menu de navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/pets.html">Pets</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/saiba-mais.html">Saiba Mais</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/sobre-nos.html">Sobre Nós</a></li>
        </ul>
        <ul class="navbar-nav" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4">Minhas Solicitações de Adoção</h2>
    <div id="adocoes-list">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
      </div>
    </div>
  </div>

  <footer class="text-center">
    <div class="container"><p class="mb-0">&copy; 2026 ViraLata Club.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!isLoggedIn()) {
        window.location.href = '/pages/login.html';
        return;
      }

      try {
        const res = await apiRequest('/adocoes/minhas');
        const container = document.getElementById('adocoes-list');
        const adocoes = res.data;

        if (adocoes.length === 0) {
          container.innerHTML = '<div class="text-center text-muted py-5">Você ainda não enviou nenhuma solicitação de adoção.</div>';
          return;
        }

        container.innerHTML = `
          <div class="table-responsive">
            <table class="table table-hover bg-white rounded shadow-sm">
              <thead class="table-light">
                <tr>
                  <th>Pet</th>
                  <th>Espécie</th>
                  <th>Status</th>
                  <th>Mensagem</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody>
                ${adocoes.map(a => `
                  <tr>
                    <td>
                      <a href="/pages/pet-detail.html?id=${a.pet_id}" class="text-decoration-none">
                        ${a.pet_nome}
                      </a>
                    </td>
                    <td>${a.especie}</td>
                    <td>${statusBadge(a.status)}</td>
                    <td>${a.mensagem || '—'}</td>
                    <td>${new Date(a.created_at).toLocaleDateString('pt-BR')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (err) {
        document.getElementById('adocoes-list').innerHTML = '<div class="text-center text-danger">Erro ao carregar solicitações.</div>';
      }
    });
  </script>
</body>
</html>
